<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Docs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-900 text-slate-300 font-sans antialiased overflow-x-hidden selection:bg-teal-500 selection:text-white">

    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-80 bg-slate-900/80 backdrop-blur-xl border-r border-slate-700/50 hidden md:flex flex-col h-full shadow-2xl relative z-10">
            <div class="h-24 flex items-center px-8 border-b border-slate-800">
                <h1 class="text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-teal-400 to-emerald-400 tracking-wider">SMART CITY<br/><span class="text-xs tracking-[0.3em] text-slate-400">2026 DOCS</span></h1>
            </div>
            
            <nav id="sidebar-nav" class="flex-1 overflow-y-auto p-4 custom-scrollbar">
                <!-- Links injected by TS -->
            </nav>

            <div class="p-6 border-t border-slate-800">
                <button id="download-zip" class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-400 hover:to-emerald-400 text-slate-900 font-bold py-3 px-4 rounded-xl shadow-lg shadow-teal-500/20 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Download ZIP
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="scroll-area" class="flex-1 h-full overflow-y-auto relative custom-scrollbar animated-bg">
            <!-- Glass Overlay for Background -->
            <div class="absolute inset-0 bg-slate-900/90 pointer-events-none fixed"></div>
            
            <div class="relative z-10 px-8 py-12 md:px-16 lg:px-24 max-w-5xl mx-auto" id="main-content">
                <!-- Sections injected by TS -->
            </div>
            <section class="relative z-10 px-8 py-12 md:px-16 lg:px-24 max-w-5xl mx-auto mb-20 pt-8 scroll-mt-20" id="gallery-section">
                <h2 class="text-4xl font-extrabold mb-8 text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-emerald-400 border-b border-slate-700/50 pb-4">Project Gallery</h2>
                <!-- Gallery Grid -->
                <div id="gallery-grid" class="grid-container"></div>
            </section>
        </main>
    </div>

    <!-- Modal Overlay for Full-Res -->
    <div id="image-modal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="full-res-img" src="" alt="Full Resolution View">
    </div>

    <!-- Compile TS Script -->
    <script src="main.js"></script>
    <script>
        async function loadGallery() {
            try {
                const response = await fetch('images/map.json');
                const data = await response.json();
                const grid = document.getElementById('gallery-grid');
                
                data.forEach(item => {
                    const imgPath = `images/${item.path}`;
                    const card = document.createElement('div');
                    card.className = 'card fade-up';
                    card.onclick = () => openModal(imgPath);
                    
                    card.innerHTML = `
                        <div class="card-img-container">
                            <img src="${imgPath}" alt="${item.title}" loading="lazy">
                        </div>
                        <div class="card-content">
                            <h3>${item.title}</h3>
                            <p>${item.role}</p>
                            <button class="view-btn" onclick="downloadImage(event, '${imgPath}', '${item.path}')">Download Full Resolution</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                // Intersection Observer for fade-up animation
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1 });

                document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

                // Add to sidebar nav
                const sidebarNav = document.getElementById('sidebar-nav');
                if (sidebarNav) {
                    const link = document.createElement('a');
                    link.href = '#gallery-section';
                    link.className = 'block px-4 py-2 mt-2 text-sm font-semibold text-slate-300 rounded-lg hover:bg-slate-700 hover:text-teal-400 transition-colors nav-link';
                    link.textContent = 'Project Gallery';
                    
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        const targetEl = document.getElementById('gallery-section');
                        if (targetEl) {
                            document.getElementById('scroll-area').scrollTo({
                                top: targetEl.offsetTop - 80,
                                behavior: 'smooth'
                            });
                        }
                    });
                    sidebarNav.appendChild(link);

                    // Observer for scroll spy
                    const galleryObserver = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                document.querySelectorAll('.nav-link').forEach(l => {
                                    l.classList.remove('bg-slate-800', 'text-teal-400', 'translate-x-2');
                                });
                                link.classList.add('bg-slate-800', 'text-teal-400', 'translate-x-2');
                            }
                        });
                    }, {
                        root: document.getElementById('scroll-area'),
                        rootMargin: '0px',
                        threshold: 0.05
                    });
                    galleryObserver.observe(document.getElementById('gallery-section'));
                }

            } catch (err) {
                console.error('Error loading gallery:', err);
            }
        }

        function downloadImage(event, url, filename) {
            event.stopPropagation();
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function openModal(src) {
            const modal = document.getElementById('image-modal');
            const fullImg = document.getElementById('full-res-img');
            fullImg.src = src; // Direct path ensures original resolution
            modal.classList.add('show');
        }

        function closeModal() {
            const modal = document.getElementById('image-modal');
            modal.classList.remove('show');
            setTimeout(() => {
                document.getElementById('full-res-img').src = '';
            }, 300); // Wait for transition
        }

        // Close on background click
        document.getElementById('image-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Initialize gallery
        document.addEventListener('DOMContentLoaded', loadGallery);
    </script>
</body>
</html>
